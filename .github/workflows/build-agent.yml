name: Build and Publish Agent

on:
  push:
    branches:
      - main
    paths:
      - 'agent/csharp/**'
  pull_request:
    branches:
      - main
    paths:
      - 'agent/csharp/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: agent/csharp
        run: dotnet restore

      - name: Build
        working-directory: agent/csharp
        run: dotnet build -c Release --no-restore

      - name: Publish
        working-directory: agent/csharp
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../../publish/agent

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-win-x64
          path: publish/agent/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-win-x64
          path: agent

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: agent/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}